name: Conformance (kind, GA-only)

on:
  push:
    branches: [main]
    paths:
      - 'config.yaml'
      - '.github/actions/**'
      - '.github/workflows/conformance-kind.yml'
  pull_request:
    branches: [main]
    paths:
      - 'config.yaml'
      - '.github/actions/**'
      - '.github/workflows/conformance-kind.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  conformance-kind:
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    env:
      ARTIFACTS: ${{ github.workspace }}/_artifacts
      GOPATH: ${{ github.workspace }}/go
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - id: config
        uses: ./.github/actions/load-config
      - uses: ./.github/actions/cleanup-disk
      - uses: ./.github/actions/setup-kubernetes
        with:
          repository: ${{ steps.config.outputs.kubernetes-repo }}
          ref: ${{ steps.config.outputs.kubernetes-ref }}
          path: go/src/k8s.io/kubernetes
          fetch-depth: 0
      - uses: ./.github/actions/install-kind
      - name: Run Conformance Tests
        working-directory: go/src/k8s.io/kubernetes
        env:
          FEATURE_GATES: '{"AllAlpha":false,"AllBeta":false}'
          RUNTIME_CONFIG: '{"api/alpha":"false","api/beta":"false"}'
          PARALLEL: "true"
        run: e2e-k8s.sh
      - uses: ./.github/actions/collect-logs
        if: always()
        with:
          artifacts-dir: ${{ env.ARTIFACTS }}
          name: conformance-kind-logs
