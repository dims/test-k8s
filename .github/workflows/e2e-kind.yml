name: E2E (kind)

on:
  push:
    branches:
      - main
      - 'pull-request/[0-9]*'
    paths:
      - 'config.yaml'
      - '.github/actions/**'
      - 'projects/kubernetes/**'
      - '.github/workflows/e2e-kind.yml'
  pull_request:
    branches: [main]
    paths:
      - 'config.yaml'
      - '.github/actions/**'
      - 'projects/kubernetes/**'
      - '.github/workflows/e2e-kind.yml'
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-kind:
    runs-on: ${{ github.repository == 'dims/test-k8s' && 'ubuntu-24.04' || 'linux-amd64-cpu16' }}
    timeout-minutes: 75
    env:
      ARTIFACTS: ${{ github.workspace }}/_artifacts
      GOPATH: ${{ github.workspace }}/go
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - id: config
        uses: ./.github/actions/load-config
      - uses: ./.github/actions/cleanup-disk
      - uses: ./.github/actions/setup-runner
      - uses: ./.github/actions/setup-kubernetes
        with:
          repository: ${{ steps.config.outputs.kubernetes-repo }}
          ref: ${{ steps.config.outputs.kubernetes-sha }}
          path: go/src/k8s.io/kubernetes
          fetch-depth: 0
          patches-dir: projects/kubernetes
      - uses: ./.github/actions/report-revisions
        with:
          output-dir: ${{ env.ARTIFACTS }}
          kubernetes-repo: ${{ steps.config.outputs.kubernetes-repo }}
          kubernetes-ref: ${{ steps.config.outputs.kubernetes-ref }}
          kubernetes-sha: ${{ steps.config.outputs.kubernetes-sha }}
          containerd-repo: ${{ steps.config.outputs.containerd-repo }}
          containerd-ref: ${{ steps.config.outputs.containerd-ref }}
          containerd-sha: ${{ steps.config.outputs.containerd-sha }}
      - uses: ./.github/actions/install-kind
      - name: Run E2E Tests
        id: e2e-kind
        working-directory: go/src/k8s.io/kubernetes
        env:
          LABEL_FILTER: "Feature: isEmpty && !Slow && !Disruptive && !Flaky"
          PARALLEL: "true"
        shell: bash
        run: |
          set -o pipefail
          e2e-k8s.sh 2>&1 | tee "${ARTIFACTS}/build-log.txt"
          exit "${PIPESTATUS[0]}"
      - uses: ./.github/actions/collect-test-results
        if: always()
        with:
          artifact-name: e2e-kind-results
          artifacts-dir: ${{ env.ARTIFACTS }}
          workflow-file: .github/workflows/e2e-kind.yml
          job-name: E2E (kind)
          job-status: ${{ steps.e2e-kind.outcome }}
          mirrored-prow-job: pull-kubernetes-e2e-kind
          build-log-path: ${{ env.ARTIFACTS }}/build-log.txt
      - uses: ./.github/actions/collect-logs
        if: always()
        with:
          artifacts-dir: ${{ env.ARTIFACTS }}
          name: e2e-kind-logs
