name: Linter Hints

on:
  push:
    branches: [main]
    paths:
      - 'config.yaml'
      - '.github/actions/**'
      - '.github/workflows/linter-hints.yml'
  pull_request:
    branches: [main]
    paths:
      - 'config.yaml'
      - '.github/actions/**'
      - '.github/workflows/linter-hints.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linter-hints:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    continue-on-error: true
    env:
      GOPATH: ${{ github.workspace }}/go
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - id: config
        uses: ./.github/actions/load-config
      - uses: ./.github/actions/cleanup-disk
      - uses: ./.github/actions/setup-kubernetes
        with:
          repository: ${{ steps.config.outputs.kubernetes-repo }}
          ref: ${{ steps.config.outputs.kubernetes-ref }}
          path: go/src/k8s.io/kubernetes
          fetch-depth: 0
      - name: Linter Hints
        working-directory: go/src/k8s.io/kubernetes
        run: make verify WHAT=golangci-lint-pr-hints
      - uses: ./.github/actions/collect-logs
        if: failure()
        with:
          name: linter-logs
