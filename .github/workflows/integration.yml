name: Integration Tests

on:
  push:
    branches:
      - main
      - 'pull-request/[0-9]*'
    paths:
      - 'config.yaml'
      - '.github/actions/**'
      - 'projects/kubernetes/**'
      - '.github/workflows/integration.yml'
  pull_request:
    branches: [main]
    paths:
      - 'config.yaml'
      - '.github/actions/**'
      - 'projects/kubernetes/**'
      - '.github/workflows/integration.yml'
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    runs-on: ${{ github.repository == 'dims/test-k8s' && 'ubuntu-24.04' || 'linux-amd64-cpu16' }}
    timeout-minutes: 120
    env:
      ARTIFACTS: ${{ github.workspace }}/_artifacts
      GOPATH: ${{ github.workspace }}/go
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - id: config
        uses: ./.github/actions/load-config
      - uses: ./.github/actions/cleanup-disk
      - uses: ./.github/actions/setup-runner
      - uses: ./.github/actions/setup-kubernetes
        with:
          repository: ${{ steps.config.outputs.kubernetes-repo }}
          ref: ${{ steps.config.outputs.kubernetes-sha }}
          path: go/src/k8s.io/kubernetes
          fetch-depth: 0
          patches-dir: projects/kubernetes
      - uses: ./.github/actions/report-revisions
        with:
          output-dir: ${{ env.ARTIFACTS }}
          kubernetes-repo: ${{ steps.config.outputs.kubernetes-repo }}
          kubernetes-ref: ${{ steps.config.outputs.kubernetes-ref }}
          kubernetes-sha: ${{ steps.config.outputs.kubernetes-sha }}
          containerd-repo: ${{ steps.config.outputs.containerd-repo }}
          containerd-ref: ${{ steps.config.outputs.containerd-ref }}
          containerd-sha: ${{ steps.config.outputs.containerd-sha }}
      - name: Integration Tests
        id: integration
        working-directory: go/src/k8s.io/kubernetes
        shell: bash
        env:
          KUBE_JUNIT_REPORT_DIR: ${{ env.ARTIFACTS }}
        run: |
          set -o pipefail

          metadata_file="${ARTIFACTS}/integration-step-metadata.txt"
          mkdir -p "${ARTIFACTS}"
          started_at="$(date -Iseconds)"
          started_epoch="$(date +%s)"

          {
            echo "started_at=${started_at}"
            echo "runner_name=${RUNNER_NAME:-}"
            echo "workspace=${GITHUB_WORKSPACE:-}"
            echo "tmpdir=${TMPDIR:-}"
          } > "${metadata_file}"

          set +e
          ./hack/jenkins/test-integration-dockerized.sh 2>&1 | tee "${ARTIFACTS}/integration.log"
          test_status="${PIPESTATUS[0]}"
          set -e

          ended_at="$(date -Iseconds)"
          ended_epoch="$(date +%s)"
          {
            echo "ended_at=${ended_at}"
            echo "duration_seconds=$((ended_epoch - started_epoch))"
            echo "exit_code=${test_status}"
          } >> "${metadata_file}"

          exit "${test_status}"
      - uses: ./.github/actions/collect-test-results
        if: always()
        with:
          artifact-name: integration-results
          artifacts-dir: ${{ env.ARTIFACTS }}
          workflow-file: .github/workflows/integration.yml
          job-name: Integration Tests
          job-status: ${{ steps.integration.outcome }}
          mirrored-prow-job: pull-kubernetes-integration
          build-log-path: ${{ env.ARTIFACTS }}/integration.log
      - uses: ./.github/actions/collect-runner-diagnostics
        if: failure() && github.repository != 'dims/test-k8s'
        with:
          artifacts-dir: ${{ env.ARTIFACTS }}
          log-path: ${{ env.ARTIFACTS }}/integration.log
      - uses: ./.github/actions/collect-logs
        if: always()
        with:
          artifacts-dir: ${{ env.ARTIFACTS }}
          name: integration-logs
