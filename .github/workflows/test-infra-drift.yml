name: Test-Infra Drift

on:
  push:
    branches:
      - main
      - 'pull-request/[0-9]*'
    paths:
      - 'config.yaml'
      - 'Makefile'
      - 'projects/**'
      - '.github/actions/apply-format-patches/**'
      - '.github/actions/load-config/**'
      - '.github/actions/report-revisions/**'
      - 'scripts/**'
      - '.github/actions/install-kind/**'
      - '.github/workflows/**'
      - '.github/workflows/test-infra-drift.yml'
  pull_request:
    branches: [main]
    paths:
      - 'config.yaml'
      - 'Makefile'
      - 'projects/**'
      - '.github/actions/apply-format-patches/**'
      - '.github/actions/load-config/**'
      - '.github/actions/report-revisions/**'
      - 'scripts/**'
      - '.github/actions/install-kind/**'
      - '.github/workflows/**'
      - '.github/workflows/test-infra-drift.yml'
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift:
    runs-on: ${{ github.repository == 'dims/test-k8s' && 'ubuntu-24.04' || 'linux-amd64-cpu8' }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - id: config
        uses: ./.github/actions/load-config

      - uses: ./.github/actions/report-revisions
        with:
          kubernetes-repo: ${{ steps.config.outputs.kubernetes-repo }}
          kubernetes-ref: ${{ steps.config.outputs.kubernetes-ref }}
          kubernetes-sha: ${{ steps.config.outputs.kubernetes-sha }}
          containerd-repo: ${{ steps.config.outputs.containerd-repo }}
          containerd-ref: ${{ steps.config.outputs.containerd-ref }}
          containerd-sha: ${{ steps.config.outputs.containerd-sha }}

      - name: Checkout test-infra
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: kubernetes/test-infra
          path: test-infra
          fetch-depth: 1

      - name: Checkout Kubernetes
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: ${{ steps.config.outputs.kubernetes-repo }}
          ref: ${{ steps.config.outputs.kubernetes-sha }}
          path: src/k8s.io/kubernetes
          fetch-depth: 0

      - name: Checkout containerd
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: ${{ steps.config.outputs.containerd-repo }}
          ref: ${{ steps.config.outputs.containerd-sha }}
          path: src/github.com/containerd/containerd
          fetch-depth: 0

      - name: Run drift detector
        id: infra-drift
        shell: bash
        run: |
          set -o pipefail
          make test-infra-drift TEST_INFRA_DIR="${GITHUB_WORKSPACE}/test-infra" | tee drift-report.txt

      - name: Check Kubernetes patch stack
        id: kubernetes-patches
        uses: ./.github/actions/apply-format-patches
        with:
          repo-path: src/k8s.io/kubernetes
          patch-dir: projects/kubernetes

      - name: Check containerd patch stack
        id: containerd-patches
        uses: ./.github/actions/apply-format-patches
        with:
          repo-path: src/github.com/containerd/containerd
          patch-dir: projects/containerd

      - name: Append patch stack status
        if: always()
        shell: bash
        run: |
          {
            echo
            echo 'Patch stack status'
            echo "- Kubernetes patch apply: ${{ steps.kubernetes-patches.outcome }}"
            echo "- containerd patch apply: ${{ steps.containerd-patches.outcome }}"
          } >> drift-report.txt

      - name: Add drift summary
        if: always()
        shell: bash
        run: |
          if [ -f drift-report.txt ]; then
            {
              echo '### Test-Infra Drift Report'
              echo
              echo '```text'
              cat drift-report.txt
              echo '```'
              echo
              echo '### Patch Stack Status'
              echo
              echo "- Kubernetes patch apply: `${{ steps.kubernetes-patches.outcome }}`"
              echo "- containerd patch apply: `${{ steps.containerd-patches.outcome }}`"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: test-infra-drift-report
          path: drift-report.txt
          if-no-files-found: error
