name: Publish Grid Data

on:
  workflow_run:
    workflows:
      - Unit Tests
      - Integration Tests
      - Verify
      - Linter Hints
      - Typecheck
      - Dependencies
      - Cmd Tests
      - E2E (kind)
      - E2E (kind, alpha-beta-features)
      - Conformance (kind, GA-only)
      - Node E2E
      - Patch Apply
      - Test-Infra Drift
    types:
      - completed
  schedule:
    - cron: '37 5 * * *'
  workflow_dispatch:

concurrency:
  group: publish-grid-data
  cancel-in-progress: false

jobs:
  build-grid-data:
    if: (github.event_name == 'workflow_run' && github.event.workflow_run.head_branch == 'main') || (github.event_name != 'workflow_run' && github.ref_name == 'main')
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Build site data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/publish_grid_data.py \
            --repo "${GITHUB_REPOSITORY}" \
            --output-dir _site

      - name: Upload site preview
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: grid-site-preview
          path: _site/
          if-no-files-found: error

      - name: Publish gh-pages branch
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          repo_url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          site_dir="${GITHUB_WORKSPACE}/_site"
          publish_dir="$(mktemp -d)"

          if git ls-remote --exit-code --heads "${repo_url}" gh-pages >/dev/null 2>&1; then
            git clone --branch gh-pages --depth 1 "${repo_url}" "${publish_dir}"
          else
            git clone --depth 1 "${repo_url}" "${publish_dir}"
            cd "${publish_dir}"
            git checkout --orphan gh-pages
          fi

          find "${publish_dir}" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a "${site_dir}/." "${publish_dir}/"

          cd "${publish_dir}"
          touch .nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No site changes to publish"
            exit 0
          fi
          git commit -m "Publish grid data for ${GITHUB_SHA}"
          git push origin HEAD:gh-pages
