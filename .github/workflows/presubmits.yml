name: Kubernetes Presubmits

on:
  push:
    branches: [main]
    paths:
      - 'config.yaml'
      - '.github/actions/**'
      - '.github/workflows/load-config.yml'
      - '.github/workflows/presubmits.yml'
  pull_request:
    branches: [main]
    paths:
      - 'config.yaml'
      - '.github/actions/**'
      - '.github/workflows/load-config.yml'
      - '.github/workflows/presubmits.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  load-config:
    uses: ./.github/workflows/load-config.yml

  # pull-kubernetes-verify
  verify:
    name: Verify
    needs: load-config
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: ./.github/actions/cleanup-disk
      - uses: ./.github/actions/setup-kubernetes
        with:
          repository: ${{ needs.load-config.outputs.kubernetes-repo }}
          ref: ${{ needs.load-config.outputs.kubernetes-ref }}
          path: kubernetes
          fetch-depth: 0
      - name: Verify
        working-directory: kubernetes
        env:
          EXCLUDE_TYPECHECK: "y"
          EXCLUDE_GODEP: "y"
          KUBE_VERIFY_GIT_BRANCH: master
        run: ./hack/jenkins/verify-dockerized.sh
      - uses: ./.github/actions/collect-logs
        if: failure()
        with:
          name: verify-logs

  # pull-kubernetes-unit
  unit:
    name: Unit Tests
    needs: load-config
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: ./.github/actions/cleanup-disk
      - uses: ./.github/actions/setup-kubernetes
        with:
          repository: ${{ needs.load-config.outputs.kubernetes-repo }}
          ref: ${{ needs.load-config.outputs.kubernetes-ref }}
          path: kubernetes
      - name: Unit Tests
        working-directory: kubernetes
        run: make test
      - uses: ./.github/actions/collect-logs
        if: failure()
        with:
          name: unit-logs

  # pull-kubernetes-integration
  integration:
    name: Integration Tests
    needs: load-config
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: ./.github/actions/cleanup-disk
      - uses: ./.github/actions/setup-kubernetes
        with:
          repository: ${{ needs.load-config.outputs.kubernetes-repo }}
          ref: ${{ needs.load-config.outputs.kubernetes-ref }}
          path: kubernetes
      - name: Integration Tests
        working-directory: kubernetes
        run: ./hack/jenkins/test-integration-dockerized.sh
      - uses: ./.github/actions/collect-logs
        if: failure()
        with:
          name: integration-logs

  # pull-kubernetes-typecheck
  typecheck:
    name: Typecheck
    needs: load-config
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: ./.github/actions/cleanup-disk
      - uses: ./.github/actions/setup-kubernetes
        with:
          repository: ${{ needs.load-config.outputs.kubernetes-repo }}
          ref: ${{ needs.load-config.outputs.kubernetes-ref }}
          path: kubernetes
      - name: Typecheck
        working-directory: kubernetes
        run: make verify WHAT=typecheck
      - uses: ./.github/actions/collect-logs
        if: failure()
        with:
          name: typecheck-logs

  # pull-kubernetes-dependencies
  dependencies:
    name: Dependencies
    needs: load-config
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: ./.github/actions/cleanup-disk
      - uses: ./.github/actions/setup-kubernetes
        with:
          repository: ${{ needs.load-config.outputs.kubernetes-repo }}
          ref: ${{ needs.load-config.outputs.kubernetes-ref }}
          path: kubernetes
      - name: Verify Dependencies
        working-directory: kubernetes
        run: make verify WHAT="external-dependencies-version vendor vendor-licenses"
      - uses: ./.github/actions/collect-logs
        if: failure()
        with:
          name: dependencies-logs

  # pull-kubernetes-cmd
  cmd:
    name: Cmd Tests
    needs: load-config
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: ./.github/actions/cleanup-disk
      - uses: ./.github/actions/setup-kubernetes
        with:
          repository: ${{ needs.load-config.outputs.kubernetes-repo }}
          ref: ${{ needs.load-config.outputs.kubernetes-ref }}
          path: kubernetes
      - name: Cmd Tests
        working-directory: kubernetes
        env:
          KUBE_INTEGRATION_TEST_MAX_CONCURRENCY: "8"
          KUBE_TIMEOUT: "-timeout=30m"
        run: ./hack/jenkins/test-cmd-dockerized.sh
      - uses: ./.github/actions/collect-logs
        if: failure()
        with:
          name: cmd-logs

  # pull-kubernetes-linter-hints (optional — failures are informational)
  linter-hints:
    name: Linter Hints
    needs: load-config
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: ./.github/actions/cleanup-disk
      - uses: ./.github/actions/setup-kubernetes
        with:
          repository: ${{ needs.load-config.outputs.kubernetes-repo }}
          ref: ${{ needs.load-config.outputs.kubernetes-ref }}
          path: kubernetes
          fetch-depth: 0
      - name: Linter Hints
        working-directory: kubernetes
        run: make verify WHAT=golangci-lint-pr-hints
      - uses: ./.github/actions/collect-logs
        if: failure()
        with:
          name: linter-logs

  # pull-kubernetes-e2e-kind (prow: 60m timeout + 15m grace)
  e2e-kind:
    name: E2E (kind)
    needs: load-config
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: ./.github/actions/cleanup-disk
      - uses: ./.github/actions/setup-kubernetes
        with:
          repository: ${{ needs.load-config.outputs.kubernetes-repo }}
          ref: ${{ needs.load-config.outputs.kubernetes-ref }}
          path: kubernetes
      - uses: ./.github/actions/install-kind
      - name: Run E2E Tests
        working-directory: kubernetes
        env:
          LABEL_FILTER: "Feature: isEmpty && !Slow && !Disruptive && !Flaky"
          PARALLEL: "true"
          ARTIFACTS: ${{ github.workspace }}/_artifacts
        run: e2e-k8s.sh
      - uses: ./.github/actions/collect-logs
        if: failure()
        with:
          name: e2e-kind-logs

  # pull-kubernetes-conformance-kind-ga-only-parallel (prow: 60m timeout + 15m grace)
  conformance-kind:
    name: Conformance (kind, GA-only)
    needs: load-config
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: ./.github/actions/cleanup-disk
      - uses: ./.github/actions/setup-kubernetes
        with:
          repository: ${{ needs.load-config.outputs.kubernetes-repo }}
          ref: ${{ needs.load-config.outputs.kubernetes-ref }}
          path: kubernetes
      - uses: ./.github/actions/install-kind
      - name: Run Conformance Tests
        working-directory: kubernetes
        env:
          FEATURE_GATES: '{"AllAlpha":false,"AllBeta":false}'
          RUNTIME_CONFIG: '{"api/alpha":"false","api/beta":"false"}'
          PARALLEL: "true"
          ARTIFACTS: ${{ github.workspace }}/_artifacts
        run: e2e-k8s.sh
      - uses: ./.github/actions/collect-logs
        if: failure()
        with:
          name: conformance-kind-logs
