name: Load Config
description: Parse config.yaml and expose repository and ref settings

outputs:
  kubernetes-repo:
    description: Kubernetes repository (owner/repo)
    value: ${{ steps.config.outputs.kubernetes-repo }}
  kubernetes-ref:
    description: Kubernetes git ref
    value: ${{ steps.config.outputs.kubernetes-ref }}
  kubernetes-sha:
    description: Resolved Kubernetes commit SHA
    value: ${{ steps.config.outputs.kubernetes-sha }}
  containerd-repo:
    description: containerd repository (owner/repo)
    value: ${{ steps.config.outputs.containerd-repo }}
  containerd-ref:
    description: containerd git ref
    value: ${{ steps.config.outputs.containerd-ref }}
  containerd-sha:
    description: Resolved containerd commit SHA
    value: ${{ steps.config.outputs.containerd-sha }}

runs:
  using: composite
  steps:
    - name: Install yq
      if: ${{ !hashFiles('/usr/bin/yq', '/usr/local/bin/yq') }}
      shell: bash
      run: |
        if ! command -v yq &>/dev/null; then
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
        fi
    - name: Parse config.yaml
      id: config
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        repo_from_url() {
          echo "$1" | sed -E 's|^https?://[^/]+/||; s|\.git$||'
        }

        resolve_sha() {
          local repo="$1" ref="$2"
          sha=$(gh api "repos/${repo}/commits/${ref}" --jq '.sha') || {
            echo "failed to resolve ${repo}@${ref}" >&2; exit 1
          }
          echo "$sha"
        }

        kubernetes_url=$(yq '.kubernetes.url' config.yaml)
        kubernetes_ref=$(yq '.kubernetes.ref' config.yaml)
        kubernetes_repo=$(repo_from_url "$kubernetes_url")

        containerd_url=$(yq '.containerd.url' config.yaml)
        containerd_ref=$(yq '.containerd.ref' config.yaml)
        containerd_repo=$(repo_from_url "$containerd_url")

        {
          echo "kubernetes-repo=${kubernetes_repo}"
          echo "kubernetes-ref=${kubernetes_ref}"
          echo "kubernetes-sha=$(resolve_sha "$kubernetes_repo" "$kubernetes_ref")"
          echo "containerd-repo=${containerd_repo}"
          echo "containerd-ref=${containerd_ref}"
          echo "containerd-sha=$(resolve_sha "$containerd_repo" "$containerd_ref")"
        } >> "$GITHUB_OUTPUT"
