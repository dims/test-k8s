name: Collect runner diagnostics
description: Capture runner state and integration startup signals for failed self-hosted jobs

inputs:
  artifacts-dir:
    description: 'Path to artifacts directory'
    default: '_artifacts'
  log-path:
    description: 'Primary integration log path to inspect'
    required: false

runs:
  using: composite
  steps:
    - name: Collect runner diagnostics
      shell: bash
      run: |
        bash "${{ github.action_path }}/collect.sh" "${{ inputs.artifacts-dir }}" "${{ inputs.log-path }}"
